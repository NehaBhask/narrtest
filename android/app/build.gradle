plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.narrator"
    compileSdk flutter.compileSdkVersion
    ndkVersion "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = "17" }

    defaultConfig {
        applicationId "com.narrator"
        minSdk 26         // Android 8.0 — matches README; posix_spawn only needed for server tools (excluded)
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName

        ndk {
            // Build narrator_ncnn.so for 64-bit ARM only (modern devices)
            abiFilters "arm64-v8a"
        }
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -O3"
                arguments "-DANDROID_PLATFORM=android-28",
                          "-DANDROID_ARM_NEON=TRUE"
                abiFilters "arm64-v8a"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false   // Keep false — model paths must be intact
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
        debug {
            debuggable true
        }
    }

    // Large model files — disable compression so they can be mmap'd
    aaptOptions {
        noCompress "gguf", "onnx", "bin", "param", "tflite"
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }
    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
}

flutter { source "../.." }

dependencies {
    // OnnxRuntime Mobile for Silero VAD, Whisper-tiny, IndicTrans2
    implementation 'com.microsoft.onnxruntime:onnxruntime-android:1.17.3'

    // Kotlin coroutines
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"

    // CameraX (used internally by Flutter camera plugin)
    implementation "androidx.camera:camera-core:1.3.1"
    implementation "androidx.camera:camera-camera2:1.3.1"
    implementation "androidx.camera:camera-lifecycle:1.3.1"

    // Core
    implementation "androidx.core:core-ktx:1.12.0"
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation 'net.java.dev.jna:jna:5.13.0@aar'
    implementation 'com.alphacephei:vosk-android:0.3.47'
}
