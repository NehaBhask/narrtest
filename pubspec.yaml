name: narrator
description: Real-time offline-first conversational visual assistant for the visually impaired.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.10.5+9

  # TTS
  flutter_tts: ^4.0.2

  # HTTP / connectivity
  http: ^1.2.1
  connectivity_plus: ^6.0.3

  # Local storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # ONNX Runtime (VAD, STT, translation)
  onnxruntime: ^1.4.0

  # Permissions
  permission_handler: ^11.3.1

  # Crypto (model integrity SHA-256)
  crypto: ^3.0.3

  # Vibration / haptics
  vibration: ^2.0.0

  # UI
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/models/
