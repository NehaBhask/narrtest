name: narrator
description: Offline-first real-time visual assistant with dual AI pipelines.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependency_overrides:
  record_linux: "1.3.0"
  record_platform_interface: "1.5.0"
dependencies:
  flutter:
    sdk: flutter
  fftea: ^1.3.0

  # ── Camera ────────────────────────────────────────────────
  # 0.12.x uses AndroidSurfaceProducer API — works with Impeller/Vulkan.
  # Do NOT downgrade to 0.10.x which used the old SurfaceTexture that
  # is incompatible with Impeller and causes a full black screen.
  camera: ^0.12.0

  # ── TTS & Audio ───────────────────────────────────────────
  flutter_tts: ^4.0.2
  vibration: ^2.0.0
  record: ^6.0.0           # microphone recording (VAD / STT)
  just_audio: ^0.9.38      # audio playback if needed

  # ── On-Device ONNX Inference ──────────────────────────────
  onnxruntime: ^1.4.0      # Silero VAD, IndicTrans2, Whisper-tiny

  # ── Wake Word ─────────────────────────────────────────────
  # Using openwakeword via a method channel (see android/ native code)
  # picovoice_flutter: ^3.0.4   # alternative: Porcupine

  # ── Networking ────────────────────────────────────────────
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ── Storage & Preferences ─────────────────────────────────
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Permissions ───────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Image Processing ──────────────────────────────────────
  image: ^4.1.7             # pHash computation, image manipulation

  # ── Isolates ──────────────────────────────────────────────
  flutter_isolate: ^2.0.4

  # ── Crypto / Integrity ────────────────────────────────────
  crypto: ^3.0.3

  # ── UI / UX ───────────────────────────────────────────────
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  percent_indicator: ^4.2.3
  gap: ^3.0.1
  flutter_animate: ^4.5.0

  # ── Utilities ─────────────────────────────────────────────
  intl: ^0.19.0
  logger: ^2.3.0
  rxdart: ^0.27.7
  google_mlkit_translation: ^0.13.1
  speech_to_text: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/animations/
    - assets/i18n/
    - assets/models/whisper_vocab.json

  # fonts:
  #   - family: Outfit
  #     fonts:
  #       - asset: assets/fonts/Outfit-Regular.ttf
  #       - asset: assets/fonts/Outfit-SemiBold.ttf
  #         weight: 600
